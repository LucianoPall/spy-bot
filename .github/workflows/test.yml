name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint -- --max-warnings 0

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run e2e
        timeout-minutes: 10

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  api-protection-tests:
    name: API Protection Tests (Critical)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run API Protection Tests
        run: npx playwright test api-protection.spec.ts
        timeout-minutes: 5

      - name: Report test results
        if: always()
        run: |
          echo "API Protection Tests Status:"
          npx playwright test api-protection.spec.ts --reporter=list

  quality-gate:
    name: Quality Gate
    needs: [unit-tests, e2e-tests, api-protection-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all tests passed
        run: |
          if [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.e2e-tests.result }}" = "failure" ] || \
             [ "${{ needs.api-protection-tests.result }}" = "failure" ]; then
            echo "❌ Test suite failed - quality gate blocked"
            exit 1
          fi
          echo "✅ All tests passed - quality gate approved"

      - name: Summary
        if: success()
        run: |
          echo "🎉 All checks passed!"
          echo "✅ Unit tests: passed"
          echo "✅ E2E tests: passed"
          echo "✅ API Protection: passed"
          echo "✅ Quality gate: approved"
